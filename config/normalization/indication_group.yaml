# Indication group — keyword-based classification of CT.gov Conditions field
# Format: Group_Name: [list of case-insensitive substrings]
# A trial matches a group if ANY of its comma-separated condition strings
# contains ANY of the listed keywords (case-insensitive substring match).
# A trial can match multiple groups.
#
# Ordering: determines the display order in the sidebar filter.

Lymphoma:
  - "lymphoma"
  - "hodgkin"

