# Drug name lookup for hover tooltips.
# Key: Antibody_Name_Norm (exact match from assets.csv).
# Fields:
#   brand: commercial/brand name
#   inn:   full INN of the conjugate (leave empty if identical to the antibody name)
#   note:  provenance / context
#
# Expand as further drugs receive official brand or INN names.

drugs:

  "ibritumomab":
    brand: "Zevalin"
    inn: "ibritumomab tiuxetan"
    note: >
      FDA approved Feb 2002 (Y-90); first approved radioimmunotherapy drug.
      Ownership: IDEC → Biogen Idec → Spectrum Pharmaceuticals (2012) →
      Acrotech Biopharma (Jan 2019).

  "tositumomab":
    brand: "Bexxar"
    inn: "tositumomab and iodine I 131 tositumomab"
    note: >
      FDA approved Jun 2003 (I-131); withdrawn from US market Feb 2014
      due to commercial reasons (low uptake). Owned by GlaxoSmithKline.

