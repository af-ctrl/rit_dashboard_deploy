# Asset owner type classification for the Company Asset Portfolio chart.
#
# Covers every unique Asset_Owner_Norm value in assets.csv (259 non-null rows).
# Generated 2026-03-21 via:
#   1. Rule-based name-pattern classifier (company/academic indicators)
#   2. Web searches for ambiguous / unknown entries
#   3. Manual correction of false positives and compound entries
#
# Fields:
#   type:    company | academic | mixed | unknown
#   company: canonical display name shown in the portfolio chart
#            (required for type=company or mixed; omit / null for academic/unknown)
#   note:    optional confidence or provenance comment
#
# The chart includes assets where type is 'company' or 'mixed' (using the
# extracted company name). Academic and unknown entries are excluded.
#
# To add a new drug: copy any entry, fill in the fields, save.
# No Python changes needed — the chart reloads this file on each Streamlit run.

